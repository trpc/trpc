name: Release "@canary"-tagged packages

on:
  push:
    branches:
      - 'main'
    paths:
      - '.github/setup/*'
      - '.github/workflows/release-canary.yml'
      - 'packages/**'
      - '!packages/**/package.json'
      - '!packages/tests/**'

jobs:
  publish:
    if: "!contains(github.event.head_commit.message, 'chore: version packages')"
    timeout-minutes: 10
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ vars.TURBO_TEAM }}

    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: ./.github/setup

      - run: echo "//registry.npmjs.org/:_authToken=$NPM_TOKEN" > $HOME/.npmrc
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Ensure a changeset exists for canary
        run: |
          cat > .changeset/canary-release.md << 'CHANGESET'
          ---
          "@trpc/server": patch
          ---

          Canary release
          CHANGESET

      - name: Create canary snapshot versions
        run: |
          pnpm changeset version --snapshot canary
          tsx scripts/version.ts

      - name: Build
        run: pnpm build

      - name: Publish canary packages
        run: pnpm changeset publish --tag canary
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
