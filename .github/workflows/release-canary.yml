name: Release "@canary"-tagged packages

on:
  workflow_dispatch:
  push:
    branches:
      - 'main'
    paths:
      - '.github/setup/*'
      - '.github/workflows/release-canary.yml'
      - 'packages/**'
      - '!packages/**/package.json'
      - '!packages/test/**'

jobs:
  publish:
    timeout-minutes: 10
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ vars.TURBO_TEAM }}
      NPM_CONFIG_PROVENANCE: true

    runs-on: ubuntu-latest
    permissions:
      contents: write # For fixing formatting
      id-token: write # For OIDC publishing
      pull-requests: write # For creating release PRs

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.ACCESS_TOKEN }}

      - name: Configure git
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"

      - uses: ./.github/setup
      - run: pnpm add -g npm@latest # For OIDC publishing

      - run: pnpm lerna publish --force-publish --canary --preid canary --dist-tag canary --yes
