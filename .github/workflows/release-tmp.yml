name: Release "@tmp"-tagged packages

on:
  push:
    branches:
      # Replace this with the branch you want to release from
      - '6955/again'
    paths:
      - '.github/setup/*'
      - '.github/workflows/release-tmp.yml'
      - 'packages/**'
      - '!packages/**/package.json'
      - '!packages/tests/**'

jobs:
  publish:
    timeout-minutes: 10
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ vars.TURBO_TEAM }}

    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: ./.github/setup

      - run: echo "//registry.npmjs.org/:_authToken=$NPM_TOKEN" > $HOME/.npmrc
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Determine branch identifier
        id: branch
        run: echo "name=$(pnpm --silent current-branch)" >> $GITHUB_OUTPUT

      - name: Ensure a changeset exists for tmp release
        run: |
          cat > .changeset/tmp-release.md << 'CHANGESET'
          ---
          "@trpc/server": patch
          ---

          Temporary release
          CHANGESET

      - name: Create tmp snapshot versions
        run: |
          pnpm changeset version --snapshot "alpha-tmp-${{ steps.branch.outputs.name }}"
          tsx scripts/version.ts

      - name: Build
        run: pnpm build

      - name: Publish tmp packages
        run: pnpm changeset publish --tag tmp
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
