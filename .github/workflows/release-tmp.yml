name: Release "@tmp"-tagged packages

on:
  push:
    branches:
      # Replace this with the branch you want to release from
      # 👇👇👇👇👇👇👇👇👇👇👇👇👇👇👇👇
      - '6955/again'
      # 👆👆👆👆👆👆👆👆👆👆👆👆👆👆👆👆
    paths:
      - '.github/setup/*'
      - '.github/workflows/release-tmp.yml'
      - 'packages/**'
      - '!packages/**/package.json'
      - '!packages/test/**'

jobs:
  publish:
    timeout-minutes: 10
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ vars.TURBO_TEAM }}
      NPM_CONFIG_PROVENANCE: true

    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # For OIDC publishing

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: ./.github/setup
      - run: pnpm add -g npm@latest # For OIDC publishing

      - run: pnpm lerna publish --force-publish --canary --preid "alpha-tmp-$(pnpm --silent current-branch)" --dist-tag tmp --yes
