library:
  name: '@trpc/server'
  version: '11.14.0'
  repository: 'https://github.com/trpc/trpc'
  description: >
    End-to-end typesafe APIs for TypeScript. tRPC lets you define server
    procedures (query, mutation, subscription) and call them from clients
    with full static type safety and autocompletion, without schemas or
    code generation.
  primary_framework: 'framework-agnostic'

domains:
  - name: 'Defining the API'
    slug: 'defining-api'
    description: >
      Server-side setup: initializing tRPC, defining routers, procedures,
      context, middleware, validators, error handling, and metadata.

  - name: 'Consuming the API'
    slug: 'consuming-api'
    description: >
      Client-side setup: creating tRPC clients, configuring links, headers,
      transformers, and calling procedures from vanilla JS or React.

  - name: 'Hosting the API'
    slug: 'hosting-api'
    description: >
      Mounting tRPC on a server or serverless runtime via adapters
      (standalone, Express, Fastify, Next.js, AWS Lambda, Fetch/edge).

  - name: 'Real-time'
    slug: 'realtime'
    description: >
      Subscriptions via Server-Sent Events or WebSockets, including
      tracked events, reconnection, and streaming patterns.

  - name: 'Framework integration'
    slug: 'framework-integration'
    description: >
      Using tRPC with specific frameworks (Next.js, React via TanStack
      Query) including SSR, server components, and hydration.

  - name: 'Interop and publishing'
    slug: 'interop'
    description: >
      Generating OpenAPI specs, publishing typed REST clients, and
      service-oriented architecture patterns.

skills:
  # ── Defining the API ──────────────────────────────────────────────

  - name: 'Server setup'
    slug: 'server-setup'
    domain: 'defining-api'
    description: >
      Initialize tRPC, define routers with query/mutation/subscription
      procedures, configure context, and export AppRouter type.
    type: core
    packages:
      - '@trpc/server'
    covers:
      - 'initTRPC.create()'
      - 't.router()'
      - 't.procedure / publicProcedure'
      - '.query() / .mutation() / .subscription()'
      - 'createContext()'
      - 'mergeRouters()'
      - 'lazy() router loading'
      - 'export type AppRouter'
    tasks:
      - 'Initialize a new tRPC backend from scratch'
      - 'Add a new query or mutation procedure'
      - 'Define and export the AppRouter type for clients'
      - 'Set up context with request-scoped data'
      - 'Split context into inner/outer for testability'
      - 'Lazy-load routers for serverless cold start optimization'
      - 'Merge multiple routers into one'
    failure_modes:
      - mistake: 'Calling initTRPC.create() more than once'
        mechanism: >
          Multiple tRPC instances cause type mismatches and runtime errors
          when routers from different instances are merged.
        wrong_pattern: |
          // file: userRouter.ts
          const t = initTRPC.create();
          // file: postRouter.ts
          const t2 = initTRPC.create(); // second instance!
        correct_pattern: |
          // file: trpc.ts (single file)
          const t = initTRPC.context<Context>().create();
          export const router = t.router;
          export const publicProcedure = t.procedure;
        source: 'www/docs/server/routers.md'
        priority: CRITICAL
        status: active

      - mistake: 'Using reserved words as procedure names'
        mechanism: >
          Router creation throws if procedure names are "then", "call",
          or "apply" — these conflict with JavaScript Proxy internals.
        wrong_pattern: |
          const appRouter = router({
            then: publicProcedure.query(() => 'hello'),
          });
        correct_pattern: |
          const appRouter = router({
            next: publicProcedure.query(() => 'hello'),
          });
        source: 'packages/server/src/unstable-core-do-not-import/router.ts:210-221'
        priority: HIGH
        status: active

      - mistake: 'Importing AppRouter as a value import'
        mechanism: >
          A non-type import pulls the entire server bundle into the client.
          Must use `import type` so it is stripped at build time.
        wrong_pattern: |
          import { AppRouter } from '../server/router';
        correct_pattern: |
          import type { AppRouter } from '../server/router';
        source: 'maintainer interview'
        priority: CRITICAL
        status: active

      - mistake: 'Creating context without inner/outer split'
        mechanism: >
          Without an inner context factory, server-side callers (tests,
          internal logic) must construct HTTP request objects to get context.
        wrong_pattern: |
          export function createContext({ req }: CreateExpressContextOptions) {
            return { db: prisma, user: getUserFromReq(req) };
          }
        correct_pattern: |
          export function createContextInner(opts: { user?: User }) {
            return { db: prisma, user: opts.user ?? null };
          }
          export function createContext({ req }: CreateExpressContextOptions) {
            return createContextInner({ user: getUserFromReq(req) });
          }
        source: 'examples/next-prisma-starter/src/server/context.ts'
        priority: MEDIUM
        status: active

      - mistake: 'Merging routers with different transformers'
        mechanism: >
          t.mergeRouters() throws at runtime if the routers were created
          with different transformer or errorFormatter configurations.
        wrong_pattern: |
          const t1 = initTRPC.create({ transformer: superjson });
          const t2 = initTRPC.create(); // default transformer
          t1.mergeRouters(router1, router2);
        correct_pattern: |
          // Use a single initTRPC instance for all routers
          const t = initTRPC.create({ transformer: superjson });
        source: 'packages/server/src/unstable-core-do-not-import/router.ts:517-545'
        priority: HIGH
        status: active
      - mistake: 'Hallucinating v10 API patterns'
        mechanism: >
          AI agents trained on older data generate v10 code: using
          createTRPCProxyClient (renamed to createTRPCClient), putting
          transformer on the client constructor (moved to links), or
          using Observable subscriptions (deprecated for async generators).
          Refer to the v10→v11 migration guide for all changed APIs.
        wrong_pattern: |
          import { createTRPCProxyClient } from '@trpc/client';
        correct_pattern: |
          import { createTRPCClient } from '@trpc/client';
        source: 'www/docs/migration/migrate-from-v10-to-v11.mdx'
        priority: CRITICAL
        status: active
        skills: ['server-setup', 'client-setup', 'links', 'subscriptions']

      - mistake: 'Using type assertions to work around AppRouter import errors'
        mechanism: >
          When AppRouter type import fails (monorepo config, path issues),
          agents cast to `as any` or inline a client-only representation
          of the type. This destroys type safety. Fix the import path or
          monorepo configuration instead.
        wrong_pattern: |
          const client = createTRPCClient<any>({ links: [...] });
          // or
          type AppRouter = { user: { get: ... } }; // manually recreated
        correct_pattern: |
          // Fix the actual import — use monorepo tools (Nx, turborepo)
          // or publish the type from a shared package
          import type { AppRouter } from '@myorg/api-types';
        source: 'maintainer interview'
        priority: CRITICAL
        status: active
        skills: ['server-setup', 'client-setup']

      - mistake: 'Treating tRPC as a REST API'
        mechanism: >
          AI agents may try to call tRPC endpoints with fetch() using
          REST conventions (GET /api/users/123). tRPC uses JSON-RPC over
          HTTP — procedures are called by name with JSON input, not by
          REST resource paths.
        wrong_pattern: |
          fetch('/api/trpc/users/123', { method: 'GET' })
        correct_pattern: |
          // Use the tRPC client
          const user = await trpc.users.getById.query({ id: '123' });
          // Or raw: GET /api/trpc/users.getById?input={"id":"123"}
        source: 'maintainer interview'
        priority: CRITICAL
        status: active
        skills: ['server-setup', 'client-setup']

      - mistake: 'Importing appRouter value (not type) into client'
        mechanism: >
          Importing the appRouter value (not just the type) bundles the
          entire server into the client. The router must only be imported
          as a type. Even if it works at build time, it ships server code
          to the browser.
        wrong_pattern: |
          import { appRouter } from '../server/router';
          type AppRouter = typeof appRouter; // value import!
        correct_pattern: |
          // In server: export type AppRouter = typeof appRouter;
          // In client:
          import type { AppRouter } from '../server/router';
        source: 'maintainer interview'
        priority: CRITICAL
        status: active
    compositions:
      - library: 'Zod'
        skill: 'validators'
      - library: 'SuperJSON'
        skill: 'superjson'

  - name: 'Middlewares'
    slug: 'middlewares'
    domain: 'defining-api'
    description: >
      Create and compose middleware for auth checks, logging, context
      extension, and reusable base procedures.
    type: core
    packages:
      - '@trpc/server'
    covers:
      - '.use() middleware chaining'
      - 'opts.next() with context extension'
      - '.concat() for reusable middleware'
      - '.unstable_pipe() for middleware composition'
      - 'Base procedure pattern (publicProcedure, authedProcedure)'
      - 'Advanced: OTEL tracing, logging inputs/outputs'
      - 'Advanced: getRawInput() for manual input processing'
    tasks:
      - 'Create an auth middleware that narrows context type'
      - 'Build a reusable logging/timing middleware'
      - 'Compose multiple middlewares into a base procedure'
      - 'Use .concat() to create portable middleware plugins'
      - 'Add OTEL tracing spans around procedure execution'
      - 'Log procedure inputs and outputs for debugging'
    failure_modes:
      - mistake: 'Forgetting to call and return opts.next()'
        mechanism: >
          Middleware must call opts.next() and return its result.
          Forgetting this silently drops the request with an
          INTERNAL_SERVER_ERROR because no middlewareMarker is returned.
        wrong_pattern: |
          const logMiddleware = t.middleware(async (opts) => {
            console.log('request started');
            // forgot to call opts.next()
          });
        correct_pattern: |
          const logMiddleware = t.middleware(async (opts) => {
            console.log('request started');
            const result = await opts.next();
            console.log('request ended');
            return result;
          });
        source: 'packages/server/src/unstable-core-do-not-import/procedureBuilder.ts:684-689'
        priority: CRITICAL
        status: active

      - mistake: 'Extending context with wrong type in opts.next()'
        mechanism: >
          Context extension in opts.next({ ctx: ... }) must be an object.
          Passing non-object values or overwriting existing required keys
          breaks downstream procedures.
        wrong_pattern: |
          const middleware = t.middleware(async (opts) => {
            return opts.next({ ctx: 'not-an-object' });
          });
        correct_pattern: |
          const middleware = t.middleware(async (opts) => {
            return opts.next({ ctx: { user: await getUser() } });
          });
        source: 'www/docs/server/middlewares.md'
        priority: HIGH
        status: active

      - mistake: 'Using experimental_standaloneMiddleware (deprecated)'
        mechanism: >
          experimental_standaloneMiddleware is deprecated. Use .concat()
          instead for creating reusable middleware independent of the
          tRPC instance context.
        wrong_pattern: |
          const mw = experimental_standaloneMiddleware().create(async (opts) => {
            return opts.next();
          });
        correct_pattern: |
          const mw = t.procedure.use(async (opts) => {
            return opts.next();
          });
          // Or use .concat() for portable middleware
        source: 'packages/server/src/unstable-core-do-not-import/middleware.ts:166'
        priority: MEDIUM
        status: active
    compositions: []

  - name: 'Validators'
    slug: 'validators'
    domain: 'defining-api'
    description: >
      Configure input and output validation with Zod or other Standard
      Schema validators. Handle non-serializable types via transformers.
    type: core
    packages:
      - '@trpc/server'
    covers:
      - '.input() with Zod, Yup, Superstruct, ArkType, Valibot, Effect'
      - '.output() for response validation'
      - 'Input chaining / merging'
      - 'Standard Schema protocol'
      - 'Custom validator functions'
    tasks:
      - 'Add Zod input validation to a procedure'
      - 'Add output validation for untrusted data sources'
      - 'Chain multiple .input() calls for composable schemas'
      - 'Use a custom validator function'
    failure_modes:
      - mistake: 'Chaining non-object inputs'
        mechanism: >
          Multiple .input() calls merge object types. Non-object schemas
          (string, number, array) cannot be chained and will produce
          type errors.
        wrong_pattern: |
          publicProcedure
            .input(z.string())
            .input(z.number()) // cannot merge string + number
        correct_pattern: |
          publicProcedure
            .input(z.object({ name: z.string() }))
            .input(z.object({ age: z.number() }))
            // merges to { name: string, age: number }
        source: 'www/docs/server/validators.md'
        priority: MEDIUM
        status: active

      - mistake: 'Output validation failure returns 500'
        mechanism: >
          If .output() validation fails, tRPC returns INTERNAL_SERVER_ERROR
          (500), not BAD_REQUEST. This can be confusing during development.
        wrong_pattern: |
          publicProcedure
            .output(z.object({ id: z.string() }))
            .query(() => ({ id: 123 })) // number, not string — 500 error
        correct_pattern: |
          publicProcedure
            .output(z.object({ id: z.string() }))
            .query(() => ({ id: '123' })) // string matches schema
        source: 'www/docs/server/validators.md'
        priority: MEDIUM
        status: active

      - mistake: 'Using cursor: z.optional() without nullable for infinite queries'
        mechanism: >
          React Query internally passes cursor: undefined during
          invalidation refetch. If the Zod schema uses .optional() without
          .nullable(), this fails validation with a 400 error.
        wrong_pattern: |
          .input(z.object({ cursor: z.string().optional() }))
        correct_pattern: |
          .input(z.object({ cursor: z.string().nullish() }))
        source: 'https://github.com/trpc/trpc/issues/6862'
        priority: HIGH
        status: active
    compositions:
      - library: 'Zod'

  - name: 'Error handling'
    slug: 'error-handling'
    domain: 'defining-api'
    description: >
      Throw and format errors using TRPCError, configure errorFormatter
      for client-side consumption, and handle errors globally via onError.
    type: core
    packages:
      - '@trpc/server'
    covers:
      - 'TRPCError class and error codes'
      - 'errorFormatter configuration'
      - 'onError callback in adapters'
      - 'getHTTPStatusCodeFromError()'
      - 'Stack trace behavior (isDev)'
    tasks:
      - 'Throw typed errors from procedures'
      - 'Format Zod validation errors for client display'
      - 'Set up global error logging via onError'
      - 'Map tRPC errors to HTTP status codes'
    failure_modes:
      - mistake: 'Throwing plain Error instead of TRPCError'
        mechanism: >
          Plain Error objects are caught and wrapped as INTERNAL_SERVER_ERROR.
          Use TRPCError with a specific code for proper HTTP status mapping.
        wrong_pattern: |
          throw new Error('Not found');
          // → 500 INTERNAL_SERVER_ERROR
        correct_pattern: |
          throw new TRPCError({
            code: 'NOT_FOUND',
            message: 'User not found',
          });
          // → 404 NOT_FOUND
        source: 'www/docs/server/error-handling.md'
        priority: HIGH
        status: active

      - mistake: 'Expecting stack traces in production'
        mechanism: >
          Stack traces are included only when isDev is true (default:
          NODE_ENV !== "production"). Set isDev explicitly for deterministic
          behavior across runtimes.
        source: 'www/docs/server/error-handling.md'
        priority: MEDIUM
        status: active

      - mistake: 'Not handling Zod errors in errorFormatter'
        mechanism: >
          Zod validation errors are wrapped as BAD_REQUEST TRPCErrors.
          Without a custom errorFormatter, the client receives a generic
          message without field-level details.
        wrong_pattern: |
          // No errorFormatter — client gets: "Input validation failed"
          initTRPC.create();
        correct_pattern: |
          initTRPC.create({
            errorFormatter({ shape, error }) {
              return {
                ...shape,
                data: {
                  ...shape.data,
                  zodError: error.cause instanceof ZodError
                    ? error.cause.flatten() : null,
                },
              };
            },
          });
        source: 'www/docs/server/error-formatting.md'
        priority: HIGH
        status: active
    compositions: []

  - name: 'Server-side calls'
    slug: 'server-side-calls'
    domain: 'defining-api'
    description: >
      Call procedures directly from server code using createCallerFactory
      for integration testing and internal logic.
    type: core
    packages:
      - '@trpc/server'
    covers:
      - 't.createCallerFactory()'
      - 'router.createCaller(context)'
      - 'Testing patterns'
    tasks:
      - 'Write integration tests against tRPC procedures'
      - 'Call a procedure from server-side logic without HTTP'
    failure_modes:
      - mistake: 'Using createCaller inside another procedure'
        mechanism: >
          Calling createCaller from within a procedure re-creates context,
          re-runs all middleware, and re-validates input. Extract shared
          logic into a plain function instead.
        wrong_pattern: |
          const caller = t.createCallerFactory(appRouter)({});
          publicProcedure.query(async () => {
            return caller.otherProcedure(); // wasteful
          });
        correct_pattern: |
          async function getSharedData(ctx: Context) {
            return ctx.db.query(...);
          }
          publicProcedure.query(async ({ ctx }) => {
            return getSharedData(ctx);
          });
        source: 'www/docs/server/server-side-calls.md'
        priority: HIGH
        status: active

      - mistake: 'Not providing context to createCaller'
        mechanism: >
          createCaller requires a context object. Passing undefined or
          empty object when procedures expect auth context causes runtime
          errors in middleware.
        wrong_pattern: |
          const caller = appRouter.createCaller({});
          await caller.protectedRoute(); // middleware throws UNAUTHORIZED
        correct_pattern: |
          const caller = appRouter.createCaller(
            await createContextInner({ user: testUser })
          );
          await caller.protectedRoute();
        source: 'www/docs/server/server-side-calls.md'
        priority: MEDIUM
        status: active
    compositions: []

  - name: 'Caching'
    slug: 'caching'
    domain: 'defining-api'
    description: >
      Set HTTP cache headers on query responses via responseMeta for
      CDN and browser caching.
    type: core
    packages:
      - '@trpc/server'
    covers:
      - 'responseMeta callback'
      - 'Cache-Control / s-maxage / stale-while-revalidate'
      - 'Interaction with batching'
    tasks:
      - 'Add CDN caching headers to public query responses'
      - 'Prevent caching on authenticated requests'
    failure_modes:
      - mistake: 'Caching authenticated responses'
        mechanism: >
          With batching enabled by default, a cached response containing
          personal data could be served to other users. Use splitLink to
          separate public/private requests, or check for auth headers.
        wrong_pattern: |
          responseMeta() {
            return { headers: { 'cache-control': 's-maxage=60' } };
          }
        correct_pattern: |
          responseMeta({ ctx, errors, type }) {
            if (ctx?.user || errors.length > 0 || type !== 'query') return {};
            return {
              headers: new Headers([
                ['cache-control', 's-maxage=1, stale-while-revalidate=86400'],
              ]),
            };
          }
        source: 'www/docs/server/caching.md'
        priority: CRITICAL
        status: active

      - mistake: 'Caching with Next.js App Router Cache-Control overrides'
        mechanism: >
          Next.js App Router overrides Cache-Control headers set by tRPC.
          The documented caching approach using responseMeta does not work
          as expected in App Router.
        source: 'https://github.com/trpc/trpc/issues/5625'
        priority: HIGH
        status: active
    compositions: []

  - name: 'Non-JSON content types'
    slug: 'non-json-content-types'
    domain: 'defining-api'
    description: >
      Handle FormData, file uploads, Blob, Uint8Array, and
      ReadableStream inputs in tRPC procedures.
    type: core
    packages:
      - '@trpc/server'
      - '@trpc/client'
    covers:
      - 'FormData input parsing'
      - 'octetInputParser for binary data'
      - 'File / Blob / Uint8Array handling'
      - 'Content-Type detection'
      - 'splitLink for non-JSON routing'
    tasks:
      - 'Accept file uploads via FormData in a mutation'
      - 'Handle binary data with octetInputParser'
      - 'Route non-JSON requests with splitLink'
    failure_modes:
      - mistake: 'Using httpBatchLink for FormData requests'
        mechanism: >
          FormData and binary inputs are not batchable. Use splitLink
          with isNonJsonSerializable() to route them through httpLink.
        wrong_pattern: |
          // All requests go through httpBatchLink
          links: [httpBatchLink({ url })]
        correct_pattern: |
          import { isNonJsonSerializable } from '@trpc/client';
          links: [
            splitLink({
              condition: (op) => isNonJsonSerializable(op.input),
              true: httpLink({ url }),
              false: httpBatchLink({ url }),
            }),
          ]
        source: 'www/docs/server/non-json-content-types.md'
        priority: HIGH
        status: active

      - mistake: 'Global body parser intercepting FormData before tRPC'
        mechanism: >
          Express global express.json() or Next.js default body parsing
          consumes the request body before tRPC can read it. Disable
          body parsing for tRPC routes.
        wrong_pattern: |
          // Express: global json parser
          app.use(express.json());
          app.use('/trpc', createExpressMiddleware({ router }));
        correct_pattern: |
          // Only parse JSON for non-tRPC routes
          app.use('/api', express.json());
          app.use('/trpc', createExpressMiddleware({ router }));
        source: 'www/docs/server/non-json-content-types.md'
        priority: HIGH
        status: active

      - mistake: 'FormData only works with mutations'
        mechanism: >
          FormData and binary inputs are only supported for mutations
          (POST requests). Using them with queries throws an error.
        source: 'packages/client/src/links/httpLink.ts:42-44'
        priority: HIGH
        status: active
    compositions: []

  # ── Consuming the API ─────────────────────────────────────────────

  - name: 'Client setup'
    slug: 'client-setup'
    domain: 'consuming-api'
    description: >
      Create a vanilla tRPC client with links, transformers, and headers
      for calling procedures from any TypeScript environment.
    type: core
    packages:
      - '@trpc/client'
      - '@trpc/server'
    covers:
      - 'createTRPCClient<AppRouter>()'
      - 'Link chain configuration'
      - 'Headers (static and dynamic)'
      - 'Transformer setup on links'
      - 'AbortController / signal support'
      - 'inferRouterInputs / inferRouterOutputs'
    tasks:
      - 'Create a vanilla tRPC client for a backend or CLI'
      - 'Configure authentication headers'
      - 'Set up a transformer on client links'
      - 'Infer procedure input/output types on the client'
    failure_modes:
      - mistake: 'Missing AppRouter type parameter on createTRPCClient'
        mechanism: >
          Without the type parameter, all procedure calls return `any`
          and type safety is completely lost.
        wrong_pattern: |
          const client = createTRPCClient({ links: [...] });
        correct_pattern: |
          const client = createTRPCClient<AppRouter>({ links: [...] });
        source: 'www/docs/client/vanilla/setup.mdx'
        priority: CRITICAL
        status: active

      - mistake: 'Transformer on server but not on client links'
        mechanism: >
          If the server uses a transformer (e.g. superjson), every
          terminating link on the client must also specify that
          transformer. Mismatch causes "Unable to transform response"
          errors.
        wrong_pattern: |
          // Server: initTRPC.create({ transformer: superjson })
          // Client:
          httpBatchLink({ url: '/api/trpc' }) // no transformer!
        correct_pattern: |
          httpBatchLink({ url: '/api/trpc', transformer: superjson })
        source: 'https://github.com/trpc/trpc/issues/7083'
        priority: CRITICAL
        status: active

      - mistake: 'Passing transformer to createTRPCClient instead of links'
        mechanism: >
          In v11, transformer config was moved from the client constructor
          to individual links. Passing it to createTRPCClient throws a
          TypeError.
        wrong_pattern: |
          createTRPCClient<AppRouter>({
            transformer: superjson,
            links: [httpBatchLink({ url })],
          });
        correct_pattern: |
          createTRPCClient<AppRouter>({
            links: [httpBatchLink({ url, transformer: superjson })],
          });
        source: 'packages/client/src/internals/TRPCUntypedClient.ts:44'
        priority: CRITICAL
        status: active

      - mistake: 'HTML error page instead of JSON response'
        mechanism: >
          Client error like "couldn't parse JSON, invalid character '<'"
          means the tRPC endpoint returned HTML (404/503 page) instead of
          JSON. This indicates the API URL is wrong or the infrastructure
          routing is misconfigured — not a tRPC bug.
        source: 'maintainer interview'
        priority: HIGH
        status: active

      - mistake: 'Confusion about which client factory to use'
        mechanism: >
          tRPC has several client creators across packages. Most users
          need only one: createTRPCClient from @trpc/client for vanilla,
          createTRPCContext from @trpc/tanstack-react-query for React,
          or createTRPCNext from @trpc/next for Pages Router.
        source: 'maintainer interview'
        priority: HIGH
        status: active

      - mistake: 'Worrying about @trpc/server as a client dependency'
        mechanism: >
          It is normal and expected for client packages to depend on
          @trpc/server — types are imported from there. These are
          type-only imports stripped at build time; no server code is
          bundled into the client.
        source: 'maintainer interview'
        priority: MEDIUM
        status: active
    compositions:
      - library: 'SuperJSON'
        skill: 'superjson'

  - name: 'Links'
    slug: 'links'
    domain: 'consuming-api'
    description: >
      Configure the client link chain to control batching, streaming,
      splitting, logging, and retry behavior.
    type: core
    packages:
      - '@trpc/client'
    covers:
      - 'httpLink'
      - 'httpBatchLink'
      - 'httpBatchStreamLink'
      - 'splitLink'
      - 'loggerLink'
      - 'wsLink / createWSClient'
      - 'httpSubscriptionLink'
      - 'unstable_localLink'
      - 'retryLink (internal)'
      - 'Custom link authoring'
    tasks:
      - 'Choose the right terminating link for a use case'
      - 'Enable request batching with httpBatchLink'
      - 'Enable streaming responses with httpBatchStreamLink'
      - 'Route subscriptions to a separate link with splitLink'
      - 'Add request logging for development'
      - 'Build a custom link for service-oriented routing'
    subsystems:
      - name: 'httpLink'
        config_surface: 'url, fetch, headers, transformer, methodOverride'
      - name: 'httpBatchLink'
        config_surface: 'url, maxURLLength, maxItems, headers, transformer'
      - name: 'httpBatchStreamLink'
        config_surface: 'url, streamHeader, headers, transformer'
      - name: 'wsLink'
        config_surface: 'createWSClient url, connectionParams, lazy, keepAlive, retryDelayMs'
      - name: 'httpSubscriptionLink'
        config_surface: 'url, connectionParams, EventSource ponyfill, eventSourceOptions'
    reference_candidates:
      - topic: 'Link options reference'
        reason: '>10 distinct link types each with unique configuration surfaces'
    failure_modes:
      - mistake: 'No terminating link in the chain'
        mechanism: >
          The link chain must end with a terminating link (httpLink,
          httpBatchLink, etc.). Missing one throws "No more links to
          execute - did you forget to add an ending link?"
        source: 'packages/client/src/links/internals/createChain.ts:21-24'
        priority: CRITICAL
        status: active

      - mistake: 'Sending subscriptions through httpLink or httpBatchLink'
        mechanism: >
          httpLink and httpBatchLink throw if they receive a subscription
          operation. Subscriptions must use httpSubscriptionLink or wsLink,
          typically via splitLink routing.
        wrong_pattern: |
          links: [httpBatchLink({ url })]
          // Then: client.onMessage.subscribe() → throws
        correct_pattern: |
          links: [
            splitLink({
              condition: (op) => op.type === 'subscription',
              true: httpSubscriptionLink({ url }),
              false: httpBatchLink({ url }),
            }),
          ]
        source: 'packages/client/src/links/httpLink.ts:85-88'
        priority: CRITICAL
        status: active

      - mistake: 'Batch headers callback using wrong parameter name'
        mechanism: >
          httpBatchLink headers callback receives { opList } (array),
          not { op } (single). Using the wrong name silently gets undefined.
        wrong_pattern: |
          httpBatchLink({
            url,
            headers({ op }) { // undefined for batch link!
              return { authorization: op.context.token };
            },
          })
        correct_pattern: |
          httpBatchLink({
            url,
            headers({ opList }) {
              return { authorization: opList[0]?.context.token };
            },
          })
        source: 'packages/client/src/links/httpBatchLink.ts:70'
        priority: HIGH
        status: active

      - mistake: 'httpBatchStreamLink data loss on stream completion'
        mechanism: >
          There is a known race condition where buffered chunks can be
          lost on normal stream completion. Long streaming responses
          (e.g., LLM output) may be truncated.
        source: 'https://github.com/trpc/trpc/issues/7209'
        priority: HIGH
        status: active

      - mistake: 'Default batch limits are Infinity'
        mechanism: >
          httpBatchLink maxURLLength and maxItems both default to Infinity.
          All concurrent operations batch into a single request, which can
          cause issues with URL length limits on some servers/CDNs.
        source: 'packages/client/src/links/httpBatchLink.ts:25-26'
        priority: MEDIUM
        status: active
    compositions: []

  - name: 'TanStack React Query setup'
    slug: 'react-query-setup'
    domain: 'consuming-api'
    description: >
      Set up @trpc/tanstack-react-query with providers, use queryOptions
      and mutationOptions factories with TanStack React Query hooks.
    type: framework
    packages:
      - '@trpc/tanstack-react-query'
      - '@trpc/client'
      - '@trpc/server'
    covers:
      - 'createTRPCContext()'
      - 'TRPCProvider'
      - 'useTRPC() hook'
      - 'trpc.procedure.queryOptions()'
      - 'trpc.procedure.mutationOptions()'
      - 'trpc.procedure.subscriptionOptions()'
      - 'trpc.procedure.infiniteQueryOptions()'
      - 'trpc.procedure.queryKey() / queryFilter()'
      - 'inferInput / inferOutput type helpers'
    tasks:
      - 'Set up TRPCProvider with QueryClient and tRPC client'
      - 'Fetch data with useQuery + queryOptions'
      - 'Mutate data with useMutation + mutationOptions'
      - 'Invalidate queries after mutations'
      - 'Use infinite queries with cursor-based pagination'
      - 'Subscribe to real-time data with subscriptionOptions'
    failure_modes:
      - mistake: 'Using useQuery without queryOptions factory'
        mechanism: >
          The @trpc/tanstack-react-query package is designed around
          options factories. Calling useQuery directly without
          trpc.procedure.queryOptions() loses type safety.
        wrong_pattern: |
          useQuery({ queryKey: ['user', id], queryFn: () => fetch(...) })
        correct_pattern: |
          const trpc = useTRPC();
          useQuery(trpc.user.byId.queryOptions({ id }));
        source: 'www/docs/client/tanstack-react-query/usage.mdx'
        priority: HIGH
        status: active

      - mistake: 'Missing TRPCProvider wrapper'
        mechanism: >
          useTRPC() throws "can only be used inside of a <TRPCProvider>"
          if the component tree is not wrapped.
        source: 'packages/tanstack-react-query/src/internals/Context.tsx'
        priority: HIGH
        status: active

      - mistake: 'Invalidating queries with wrong API'
        mechanism: >
          The new package uses queryClient.invalidateQueries() with
          trpc.procedure.queryFilter(), not the classic utils.invalidate()
          pattern.
        wrong_pattern: |
          // Classic pattern doesn't work with new package
          utils.post.invalidate();
        correct_pattern: |
          const trpc = useTRPC();
          const queryClient = useQueryClient();
          queryClient.invalidateQueries(trpc.post.queryFilter());
        source: 'www/docs/client/tanstack-react-query/migrating.mdx'
        priority: HIGH
        status: active
    compositions:
      - library: '@tanstack/react-query'

  - name: 'Classic React Query migration'
    slug: 'react-query-classic-migration'
    domain: 'consuming-api'
    description: >
      Migrate from @trpc/react-query (classic) to
      @trpc/tanstack-react-query using the upgrade CLI and manual fixes.
    type: lifecycle
    packages:
      - '@trpc/tanstack-react-query'
      - '@trpc/react-query'
    covers:
      - 'npx @trpc/upgrade CLI'
      - 'Hook → options factory migration patterns'
      - 'utils.invalidate → queryClient.invalidateQueries migration'
      - 'Provider migration'
    tasks:
      - 'Run the upgrade CLI to automate migration'
      - 'Manually fix remaining type errors after upgrade'
      - 'Migrate invalidation patterns'
      - 'Verify TypeScript passes after migration'
    failure_modes:
      - mistake: 'Assuming the codemod handles everything'
        mechanism: >
          npx @trpc/upgrade is a work-in-progress codemod. It handles
          common patterns but may miss complex cases. Always typecheck
          after running it.
        source: 'www/docs/client/tanstack-react-query/migrating.mdx'
        priority: MEDIUM
        status: active

      - mistake: 'Mixing classic and new hooks in same component'
        mechanism: >
          While the classic and new packages can coexist in the same app,
          mixing their hooks in the same component creates confusing
          dual-provider requirements.
        source: 'www/docs/client/tanstack-react-query/migrating.mdx'
        priority: MEDIUM
        status: active
    compositions: []

  # ── Hosting the API ───────────────────────────────────────────────

  - name: 'Adapter: Standalone'
    slug: 'adapter-standalone'
    domain: 'hosting-api'
    description: >
      Mount tRPC on Node.js built-in HTTP server using the standalone
      adapter. Simplest hosting option, ideal for local dev.
    type: core
    packages:
      - '@trpc/server'
    covers:
      - 'createHTTPServer()'
      - 'createHTTPHandler()'
      - 'createHTTP2Handler()'
      - 'basePath configuration'
      - 'CORS via cors package middleware'
    tasks:
      - 'Create a standalone tRPC HTTP server'
      - 'Add CORS support with the cors package'
      - 'Set a custom base path for the tRPC endpoint'
      - 'Use HTTP/2 with TLS'
    failure_modes:
      - mistake: 'No CORS configuration'
        mechanism: >
          The standalone adapter has no CORS handling by default.
          Cross-origin requests from browsers will fail silently.
          Use the cors package as middleware.
        wrong_pattern: |
          createHTTPServer({ router: appRouter }).listen(3000);
        correct_pattern: |
          import cors from 'cors';
          createHTTPServer({
            router: appRouter,
            middleware: cors(),
          }).listen(3000);
        source: 'www/docs/server/adapters/standalone.md'
        priority: HIGH
        status: active
    compositions: []

  - name: 'Adapter: Express'
    slug: 'adapter-express'
    domain: 'hosting-api'
    description: >
      Mount tRPC as Express middleware using createExpressMiddleware.
    type: core
    packages:
      - '@trpc/server'
    covers:
      - 'createExpressMiddleware()'
      - 'CreateExpressContextOptions (req, res)'
    tasks:
      - 'Add tRPC to an existing Express app'
      - 'Access Express req/res in context'
    failure_modes:
      - mistake: 'Global express.json() consuming tRPC request body'
        mechanism: >
          If express.json() is applied globally before the tRPC middleware,
          it consumes the request body. tRPC then receives an already-parsed
          body, which breaks for non-JSON content types like FormData.
        source: 'www/docs/server/non-json-content-types.md'
        priority: HIGH
        status: active
    compositions:
      - library: 'Express'

  - name: 'Adapter: Fastify'
    slug: 'adapter-fastify'
    domain: 'hosting-api'
    description: >
      Mount tRPC as a Fastify plugin with optional WebSocket support.
    type: core
    packages:
      - '@trpc/server'
    covers:
      - 'fastifyTRPCPlugin'
      - 'FastifyTRPCPluginOptions'
      - 'useWSS flag for WebSocket support'
      - 'prefix configuration'
    tasks:
      - 'Add tRPC to an existing Fastify app'
      - 'Enable WebSocket subscriptions in Fastify'
    failure_modes:
      - mistake: 'Registering @fastify/websocket after tRPC plugin'
        mechanism: >
          The WebSocket plugin must be registered before the tRPC plugin.
          Reverse order causes WebSocket routes to not be recognized.
        wrong_pattern: |
          server.register(fastifyTRPCPlugin, { useWSS: true, ... });
          server.register(fastifyWebsocket); // too late!
        correct_pattern: |
          server.register(fastifyWebsocket);
          server.register(fastifyTRPCPlugin, { useWSS: true, ... });
        source: 'www/docs/server/adapters/fastify.md'
        priority: HIGH
        status: active

      - mistake: 'Missing maxParamLength for batch requests'
        mechanism: >
          Fastify defaults to maxParamLength: 100. Batch requests with
          multiple procedures exceed this limit. Set maxParamLength: 5000.
        wrong_pattern: |
          const server = Fastify();
        correct_pattern: |
          const server = Fastify({ maxParamLength: 5000 });
        source: 'www/docs/server/adapters/fastify.md'
        priority: HIGH
        status: active

      - mistake: 'Using Fastify v4 with tRPC v11'
        mechanism: >
          tRPC v11 requires Fastify v5+. Fastify v4 may return empty
          responses due to incompatible response handling.
        source: 'www/docs/server/adapters/fastify.md'
        priority: CRITICAL
        status: active
    compositions:
      - library: 'Fastify'

  - name: 'Adapter: AWS Lambda'
