  # ── Real-time ─────────────────────────────────────────────────────

  - name: 'Subscriptions'
    slug: 'subscriptions'
    domain: 'realtime'
    description: >
      Set up real-time event streams using async generator subscriptions.
      SSE (httpSubscriptionLink) is recommended for most use cases.
      WebSockets (wsLink) only when bidirectional communication or
      WebSocket-specific features are required.
    type: core
    packages:
      - '@trpc/server'
      - '@trpc/client'
    covers:
      - '.subscription(async function*() { yield })'
      - 'tracked(id, data) for reconnection'
      - 'lastEventId for resuming from last event'
      - 'AbortSignal for cleanup'
      - 'httpSubscriptionLink (SSE)'
      - 'wsLink / createWSClient / applyWSSHandler (WebSocket)'
      - 'keepAlive configuration'
      - 'connectionParams for auth'
    tasks:
      - 'Create an SSE subscription procedure'
      - 'Set up WebSocket subscriptions with applyWSSHandler'
      - 'Enable tracked events for reconnection recovery'
      - 'Authenticate subscription connections'
      - 'Clean up resources when clients disconnect'
    failure_modes:
      - mistake: 'Using Observable instead of async generator'
        mechanism: >
          Observable subscriptions are deprecated and will be removed in
          v12. Use async generator syntax (async function*) instead.
        wrong_pattern: |
          import { observable } from '@trpc/server/observable';
          .subscription(({ input }) => {
            return observable((emit) => {
              emit.next(data);
            });
          })
        correct_pattern: |
          .subscription(async function* ({ input, signal }) {
            // Set up listener before fetching history
            const ee = new EventEmitter();
            for await (const event of on(ee, 'data', { signal })) {
              yield event;
            }
          })
        source: 'packages/server/src/unstable-core-do-not-import/procedureBuilder.ts:425-427'
        priority: HIGH
        status: active

      - mistake: 'Empty string as tracked event ID'
        mechanism: >
          tracked() throws if the ID is an empty string because it
          conflicts with SSE "no id" semantics.
        wrong_pattern: |
          yield tracked('', data);
        correct_pattern: |
          yield tracked(event.id.toString(), data);
        source: 'packages/server/src/unstable-core-do-not-import/stream/tracked.ts:39-44'
        priority: MEDIUM
        status: active

      - mistake: 'Fetching history before setting up event listener'
        mechanism: >
          If you fetch historical data before setting up the event
          listener, events emitted between the fetch and listener setup
          are lost.
        wrong_pattern: |
          .subscription(async function* () {
            const history = await db.getEvents(); // events may fire here
            yield* history;
            for await (const event of listener) { yield event; }
          })
        correct_pattern: |
          .subscription(async function* () {
            const listener = setupListener(); // listen first
            const history = await db.getEvents();
            yield* history;
            for await (const event of listener) { yield event; }
          })
        source: 'www/docs/server/subscriptions.md'
        priority: HIGH
        status: active

      - mistake: 'WebSocket subscription stale inputs on reconnect'
        mechanism: >
          When a WebSocket reconnects, subscriptions re-send the original
          input parameters. There is no hook to re-evaluate inputs on
          reconnect, which can cause stale data.
        source: 'https://github.com/trpc/trpc/issues/4122'
        priority: MEDIUM
        status: active

      - mistake: 'SSE ping interval >= client reconnect interval'
        mechanism: >
          If the server ping interval is >= the client reconnect timeout,
          the client disconnects thinking the connection is dead before
          receiving a ping. Server throws if misconfigured.
        source: 'packages/server/src/unstable-core-do-not-import/stream/sse.ts:96-104'
        priority: MEDIUM
        status: active

      - mistake: 'Sending custom headers with SSE without EventSource polyfill'
        mechanism: >
          The native EventSource API does not support custom headers.
          To send Authorization headers with SSE subscriptions, you must
          use an EventSource polyfill (e.g., event-source-polyfill) and
          pass it via the EventSource option on httpSubscriptionLink.
        source: 'maintainer interview, www/docs/client/links/httpSubscriptionLink.md'
        priority: HIGH
        status: active

      - mistake: 'Choosing WebSocket when SSE would suffice'
        mechanism: >
          SSE (httpSubscriptionLink) is recommended for most subscription
          use cases. WebSockets add complexity (connection management,
          reconnection, keepalive). Only use wsLink when bidirectional
          communication or WebSocket-specific features are required.
        source: 'maintainer interview'
        priority: MEDIUM
        status: active
    compositions: []

  # ── Framework integration ─────────────────────────────────────────

  - name: 'Next.js App Router'
    slug: 'nextjs-app-router'
    domain: 'framework-integration'
    description: >
      Set up tRPC in Next.js App Router with server components, RSC
      prefetching, HydrateClient, and the fetch adapter.
    type: framework
    packages:
      - '@trpc/server'
      - '@trpc/client'
      - '@trpc/tanstack-react-query'
    covers:
      - 'fetchRequestHandler in route.ts'
      - 'createTRPCOptionsProxy for server components'
      - 'createTRPCContext for client components'
      - 'HydrateClient / HydrationBoundary'
      - 'prefetchQuery / useSuspenseQuery pattern'
      - 'Server Actions'
    tasks:
      - 'Set up tRPC API route handler in app/api/trpc/[trpc]/route.ts'
      - 'Prefetch data in server components and hydrate to client'
      - 'Use tRPC with Suspense boundaries'
      - 'Call tRPC procedures from Server Actions'
    failure_modes:
      - mistake: 'Not exporting both GET and POST from route handler'
        mechanism: >
          Next.js App Router route handlers must export named GET and POST
          functions. Missing either causes queries or mutations to 405.
        wrong_pattern: |
          // app/api/trpc/[trpc]/route.ts
          export default function handler(req) { ... }
        correct_pattern: |
          // app/api/trpc/[trpc]/route.ts
          const handler = (req: Request) =>
            fetchRequestHandler({ req, router: appRouter, endpoint: '/api/trpc', createContext });
          export { handler as GET, handler as POST };
        source: 'www/docs/server/adapters/nextjs.md'
        priority: CRITICAL
        status: active

      - mistake: 'Suspense query failure crashes entire page'
        mechanism: >
          If a query fails during SSR with useSuspenseQuery, the entire
          page crashes even if wrapped in an Error Boundary. Error
          boundaries only work on the client side for SSR failures.
        source: 'www/docs/client/react/suspense.md'
        priority: HIGH
        status: active

      - mistake: 'Creating singleton QueryClient for SSR'
        mechanism: >
          In server components, each request needs its own QueryClient
          instance. A singleton QueryClient leaks data between requests.
        wrong_pattern: |
          const queryClient = new QueryClient(); // shared across requests!
        correct_pattern: |
          function makeQueryClient() {
            return new QueryClient({ ... });
          }
        source: 'www/docs/client/react/server-components.mdx'
        priority: CRITICAL
        status: active

      - mistake: 'Missing dehydrate/serialize config on QueryClient'
        mechanism: >
          RSC hydration requires configuring dehydrate.serializeData and
          hydrate.deserializeData on the QueryClient for proper data
          serialization across the server/client boundary.
        source: 'packages/react-query/src/rsc.tsx'
        priority: HIGH
        status: active
    compositions:
      - library: 'Next.js'
      - library: '@tanstack/react-query'

  - name: 'Next.js Pages Router'
    slug: 'nextjs-pages-router'
    domain: 'framework-integration'
    description: >
      Set up tRPC in Next.js Pages Router with withTRPC HOC, SSR/SSG
      helpers, and the Next.js adapter.
    type: framework
    packages:
      - '@trpc/next'
      - '@trpc/react-query'
      - '@trpc/client'
      - '@trpc/server'
    covers:
      - 'createTRPCNext()'
      - 'withTRPC() HOC'
      - 'createNextApiHandler()'
      - 'SSR via ssr: true'
      - 'SSG via createSSGHelpers'
      - 'getServerSideProps / getStaticProps integration'
    tasks:
      - 'Set up tRPC API handler in pages/api/trpc/[trpc].ts'
      - 'Wrap app with withTRPC HOC'
      - 'Enable SSR for tRPC queries'
      - 'Pre-render pages with SSG helpers'
    failure_modes:
      - mistake: 'SSR prepass renders multiple times'
        mechanism: >
          The SSR prepass loop renders the component tree repeatedly
          until no queries are fetching. This is expected but can cause
          performance issues with expensive renders.
        source: 'packages/next/src/ssrPrepass.ts:47-185'
        priority: MEDIUM
        status: active

      - mistake: 'Using ssr: true without understanding implications'
        mechanism: >
          Enabling ssr: true imports react-dom and runs prepass on every
          request. This adds latency and server load. Use selective
          prefetching in getServerSideProps instead for better control.
        source: 'www/docs/client/nextjs/overview.mdx'
        priority: MEDIUM
        status: active
    compositions:
      - library: 'Next.js'
      - library: '@tanstack/react-query'

  # ── Composition skills ────────────────────────────────────────────

  - name: 'Auth'
    slug: 'auth'
    domain: 'defining-api'
    description: >
      Implement authentication and authorization in tRPC using OAuth2.0
      with JWT bearer tokens or cookies, auth middleware, and protected
      procedures.
    type: composition
    packages:
      - '@trpc/server'
      - '@trpc/client'
    covers:
      - 'Auth middleware pattern'
      - 'Context user extraction from headers/cookies'
      - 'Protected base procedures (authedProcedure)'
      - 'Client-side Authorization header / cookie setup'
      - 'WebSocket connectionParams for auth'
      - 'SSE auth (cookies, custom headers, connection params)'
    tasks:
      - 'Set up JWT bearer token auth in context and middleware'
      - 'Create an authedProcedure base that narrows user type'
      - 'Send auth headers from the client'
      - 'Authenticate WebSocket connections'
      - 'Authenticate SSE subscription connections'
    failure_modes:
      - mistake: 'Not narrowing user type in auth middleware'
        mechanism: >
          Without context narrowing via opts.next({ ctx }), downstream
          procedures still see user as possibly null/undefined, requiring
          redundant null checks.
        wrong_pattern: |
          const authMiddleware = t.middleware(async ({ ctx, next }) => {
            if (!ctx.user) throw new TRPCError({ code: 'UNAUTHORIZED' });
            return next(); // user still nullable downstream
          });
        correct_pattern: |
          const authMiddleware = t.middleware(async ({ ctx, next }) => {
            if (!ctx.user) throw new TRPCError({ code: 'UNAUTHORIZED' });
            return next({ ctx: { user: ctx.user } }); // narrows to non-null
          });
        source: 'www/docs/server/authorization.md'
        priority: HIGH
        status: active

      - mistake: 'SSE auth via URL query params exposes tokens'
        mechanism: >
          connectionParams are sent as query strings for SSE. This exposes
          tokens in server logs and browser history. Prefer cookies for
          same-domain or custom headers via EventSource ponyfill.
        source: 'www/docs/client/links/httpSubscriptionLink.md'
        priority: HIGH
        status: active

      - mistake: 'Async headers causing stuck isFetching'
        mechanism: >
          When the headers function is async (e.g., refreshing auth
          tokens), React Query's isFetching can get stuck permanently
          in certain race conditions.
        source: 'https://github.com/trpc/trpc/issues/7001'
        priority: MEDIUM
        status: active

      - mistake: 'Skipping auth or opening CORS too wide in prototypes'
        mechanism: >
          Agents prototyping quickly may skip auth middleware or set
          CORS to "*". These patterns work for development but are
          dangerous in production. Always add auth and restrict CORS
          origin to known domains.
        source: 'maintainer interview'
        priority: HIGH
        status: active
    compositions:
      - library: 'OAuth2.0 / JWT'

  - name: 'SuperJSON'
    slug: 'superjson'
    domain: 'consuming-api'
    description: >
      Configure SuperJSON transformer on both server init and client
      links to support Date, Map, Set, BigInt, and other non-JSON types.
    type: composition
    packages:
      - '@trpc/server'
      - '@trpc/client'
    covers:
      - 'initTRPC.create({ transformer: superjson })'
      - 'httpBatchLink({ transformer: superjson })'
      - 'Symmetric transformer requirement'
    tasks:
      - 'Add SuperJSON to an existing tRPC setup'
      - 'Configure transformer on both server and all client links'
    failure_modes:
      - mistake: 'Transformer on server but not on client link'
        mechanism: >
          Server serializes with superjson but client expects plain JSON.
          Error: "Unable to transform response from server."
        wrong_pattern: |
          // Server
          initTRPC.create({ transformer: superjson });
          // Client
          httpBatchLink({ url: '/api/trpc' }); // missing transformer
        correct_pattern: |
          // Server
          initTRPC.create({ transformer: superjson });
          // Client
          httpBatchLink({ url: '/api/trpc', transformer: superjson });
        source: 'https://github.com/trpc/trpc/issues/7083'
        priority: CRITICAL
        status: active

      - mistake: 'Error responses bypass transformer'
        mechanism: >
          Some error responses (e.g., validation errors) are emitted as
          plain JSON even when superjson is configured, producing a hybrid
          wire format that fails deserialization.
        source: 'https://github.com/trpc/trpc/issues/7083'
        priority: HIGH
        status: active

      - mistake: 'Forgetting transformer on subscription links'
        mechanism: >
          httpSubscriptionLink and wsLink also need the transformer.
          When using splitLink, the transformer must be on every
          terminating link branch.
        source: 'www/docs/server/data-transformers.md'
        priority: HIGH
        status: active
    compositions:
      - library: 'superjson'

  - name: 'OpenAPI'
    slug: 'openapi'
    domain: 'interop'
    description: >
      Generate an OpenAPI 3.1 spec from a tRPC router and generate a
      publishable typed REST client using HeyAPI.
    type: composition
    packages:
      - '@trpc/openapi'
      - '@trpc/server'
    covers:
      - 'trpc-openapi CLI'
      - 'OpenAPI 3.1 spec generation'
      - 'HeyAPI client generation'
      - 'createTRPCHeyApiClientConfig()'
      - 'Transformer configuration for generated clients'
    tasks:
      - 'Generate an OpenAPI document from the tRPC router'
      - 'Generate a typed REST client with HeyAPI'
      - 'Configure transformers for the generated client'
      - 'Publish the generated client as an npm package'
    failure_modes:
      - mistake: 'Missing transformer config in HeyAPI client'
        mechanism: >
          When the tRPC server uses superjson, the generated HeyAPI client
          must also be configured with the same transformer via
          createTRPCHeyApiClientConfig({ transformer }).
        source: 'www/docs/client/openapi.md'
        priority: HIGH
        status: active

      - mistake: 'Expecting subscriptions in OpenAPI spec'
        mechanism: >
          Subscriptions are currently excluded from OpenAPI spec generation.
          SSE subscription support is planned but not yet available.
        source: 'www/docs/client/openapi.md'
        priority: MEDIUM
        status: active
    compositions:
      - library: '@hey-api/openapi-ts'

  - name: 'Service-oriented architecture'
    slug: 'service-oriented-architecture'
    domain: 'interop'
    description: >
      Break a tRPC backend into multiple services with cross-service
      calls and custom routing links.
    type: composition
    packages:
      - '@trpc/server'
      - '@trpc/client'
    covers:
      - 'Custom routing link'
      - 'Path-based service routing'
      - 'Shared procedure/router libraries'
      - 'Gateway pattern'
    tasks:
      - 'Split a monolithic tRPC API into multiple services'
      - 'Create a gateway that routes to backend services'
      - 'Build a custom link for service-based routing'
    failure_modes:
      - mistake: 'Path routing assumes server name prefix'
        mechanism: >
          Custom routing links that split on the first path segment
          break if the router structure changes. The path convention
          must be documented and enforced.
        wrong_pattern: |
          const serverName = op.path.split('.').shift();
          // Breaks if router is restructured
        correct_pattern: |
          // Use explicit router segments with clear convention
          const [serverName, ...rest] = op.path.split('.');
          const link = servers[serverName];
          return link({ ...ctx, op: { ...op, path: rest.join('.') } });
        source: 'examples/soa/client/client.ts'
        priority: MEDIUM
        status: active
    compositions: []

tensions:
  - name: 'Type safety vs runtime flexibility'
    skills: ['server-setup', 'middlewares']
    description: >
      tRPC allows routers from different initTRPC instances with different
      context types to be composed without compile-time errors, but they
      crash at runtime.
    implication: >
      An agent may mix procedures from different tRPC instances in a
      router without realizing the context types are incompatible,
      producing code that compiles but fails at runtime.

  - name: 'Batching convenience vs caching safety'
    skills: ['links', 'caching']
    description: >
      Batching is enabled by default and combines requests. Caching
      batched responses that include authenticated data can leak personal
      information to other users via CDN.
    implication: >
      An agent adding caching headers to a tRPC endpoint may not realize
      that batched requests mix public and private data in one response,
      creating a security vulnerability.

  - name: 'SSR simplicity vs server component architecture'
    skills: ['nextjs-app-router', 'nextjs-pages-router']
    description: >
      The Pages Router SSR pattern (ssr: true) is simple but imports
      react-dom and pre-renders repeatedly. The App Router pattern is
      more performant but requires manual prefetch/hydrate wiring.
    implication: >
      An agent may apply Pages Router SSR patterns in an App Router
      project, or vice versa, producing code that either doesn't work
      or has unnecessary overhead.

  - name: 'Streaming performance vs reliability'
    skills: ['links', 'subscriptions']
    description: >
      httpBatchStreamLink offers better performance but has known
      reliability issues on some platforms (React Native, edge runtimes).
      httpBatchLink is more reliable but doesn't support streaming.
    implication: >
      An agent may default to httpBatchStreamLink without considering
      the target platform's streaming support, causing intermittent
      failures that are hard to debug.

cross_references:
  - from: 'server-setup'
    to: 'client-setup'
    reason: >
      Server transformer/errorFormatter config must be matched on client.
      AppRouter type export is consumed by client.

  - from: 'server-setup'
    to: 'middlewares'
    reason: >
      Base procedures (publicProcedure, authedProcedure) are defined
      during server setup and compose middleware.

  - from: 'client-setup'
    to: 'links'
    reason: >
      Client creation requires configuring a link chain. Link choice
      determines batching, streaming, and subscription behavior.

  - from: 'client-setup'
    to: 'superjson'
    reason: >
      Transformer must be configured on every terminating link. SuperJSON
      is the most common transformer choice.

  - from: 'links'
    to: 'subscriptions'
    reason: >
      Subscription procedures require a specific link type
      (httpSubscriptionLink or wsLink) routed via splitLink.

  - from: 'auth'
    to: 'middlewares'
    reason: >
      Auth is typically implemented as middleware that narrows context
      type to non-nullable user.

  - from: 'auth'
    to: 'subscriptions'
    reason: >
      Subscription auth requires different mechanisms (connectionParams
      for WebSocket, cookies/custom headers for SSE) than HTTP auth.

  - from: 'validators'
    to: 'error-handling'
    reason: >
      Validation failures produce BAD_REQUEST TRPCErrors. Custom
      errorFormatter is needed to expose field-level Zod errors.

  - from: 'react-query-setup'
    to: 'nextjs-app-router'
    reason: >
      Next.js App Router uses @trpc/tanstack-react-query with RSC
      prefetching patterns.

  - from: 'react-query-classic-migration'
    to: 'react-query-setup'
    reason: >
      Migration target is the new TanStack React Query integration.

  - from: 'openapi'
    to: 'superjson'
    reason: >
      OpenAPI clients need transformer config matching the server when
      using superjson or similar.

  - from: 'non-json-content-types'
    to: 'links'
    reason: >
      Non-JSON inputs require splitLink routing to httpLink (not batch).

  - from: 'caching'
    to: 'auth'
    reason: >
      Cached responses must not include authenticated data. Auth-aware
      cache control logic is required.

  - from: 'nextjs-app-router'
    to: 'nextjs-pages-router'
    reason: >
      Developers may need to use both routers in the same project during
      migration. Patterns differ significantly.

